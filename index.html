<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Intelligence Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* CSS_Styles.gs - inlined */

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #fafafa;
  --bg-elevated: #ffffff;
  --bg-overlay: rgba(255,255,255,0.95);
  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-tertiary: #999999;
  --border-default: #e5e5e5;
  --border-emphasis: #d4d4d4;
  --accent-primary: #2563eb;
  --accent-hover: #1d4ed8;
  --surface-card: #ffffff;
  --surface-hover: #f5f5f5;
  --status-active: #10b981;
  --status-recent: #f59e0b;
  --status-archived: #6b7280;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
}

body.dark-mode {
  --bg-primary: #0a0a0a;
  --bg-elevated: #141414;
  --bg-overlay: rgba(20,20,20,0.95);
  --text-primary: #f5f5f5;
  --text-secondary: #a3a3a3;
  --text-tertiary: #737373;
  --border-default: #262626;
  --border-emphasis: #404040;
  --accent-primary: #3b82f6;
  --accent-hover: #60a5fa;
  --surface-card: #171717;
  --surface-hover: #1f1f1f;
  --status-active: #10b981;
  --status-recent: #f59e0b;
  --status-archived: #6b7280;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.3);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
}

body {
  font-family: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background-color 0.3s ease, color 0.3s ease;
}

.container {
  max-width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============================================ Header */
.header {
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-default);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(8px);
}

.header-content { display: flex; align-items: center; gap: 16px; }

.logo { display: flex; align-items: center; gap: 8px; }

.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent-primary);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.logo-text h1 { font-size: 16px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; }
.logo-text p { font-size: 11px; color: var(--text-tertiary); font-weight: 400; margin-top: 1px; }

.theme-toggle {
  background: var(--surface-card);
  border: 1px solid var(--border-default);
  color: var(--text-secondary);
  width: 36px; height: 36px;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  position: relative;
}

.theme-toggle:hover { background: var(--surface-hover); border-color: var(--border-emphasis); }

/* Tooltip */
.theme-toggle[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: -34px; left: 50%;
  transform: translateX(-50%);
  background: #1a1a1a; color: white;
  font-size: 11px; padding: 4px 8px;
  border-radius: 4px; white-space: nowrap;
  z-index: 200; pointer-events: none;
}
body.dark-mode .theme-toggle[title]:hover::after { background: #404040; }

/* ============================================ Filters */
.filters {
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-default);
  padding: 16px 20px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
}

.filter-group label {
  display: block; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--text-tertiary); margin-bottom: 6px;
}

.filter-group.hidden { display: none; }

select, button.refresh-btn {
  width: 100%; padding: 8px 12px;
  background: var(--surface-card);
  border: 1px solid var(--border-default);
  border-radius: 6px; color: var(--text-primary);
  font-size: 13px; font-family: inherit; transition: all 0.15s;
}

select:hover, select:focus { border-color: var(--border-emphasis); outline: none; }

button.refresh-btn {
  background: var(--accent-primary); color: white;
  border: none; font-weight: 500; cursor: pointer;
}
button.refresh-btn:hover { background: var(--accent-hover); }

/* ============================================ Project Bar */
.project-bar-wrapper {
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-default);
  position: relative;
}

.project-bar {
  padding: 10px 20px;
  display: flex; gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.project-chip {
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--border-emphasis);
  background: var(--surface-card);
  color: var(--text-secondary);
  font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s; font-family: inherit; flex-shrink: 0;
}
.project-chip:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
.project-chip.active { background: var(--accent-primary); border-color: var(--accent-primary); color: white; }

/* ============================================ Main Layout */
.main-content {
  flex: 1; display: grid;
  grid-template-columns: 360px 1fr;
  gap: 0; min-height: 0;
}

.main-content.has-project-panel {
  grid-template-columns: 360px 1fr 300px;
}

/* ============================================ Sidebar */
.sidebar {
  background: var(--bg-elevated);
  border-right: 1px solid var(--border-default);
  overflow-y: auto;
  height: calc(100vh - 120px);
}

.card { padding: 16px 20px; border-bottom: 1px solid var(--border-default); cursor: pointer; transition: all 0.15s; }
.card:hover { background: var(--surface-hover); }
.card.selected { background: var(--surface-hover); border-left: 3px solid var(--accent-primary); }

.card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }

.card-status {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px;
}

/* Phase-based dot colors */
.card-status.development { background: #3b82f6; }
.card-status.construction { background: #f97316; }
.card-status.financing { background: #a855f7; }
.card-status.operations { background: var(--status-active); }
.card-status.general-corporate { background: var(--status-archived); }
.card-status.active { background: var(--status-active); }
.card-status.recent { background: var(--status-recent); }
.card-status.archived { background: var(--status-archived); }

.card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.4; flex: 1; }

.card-meta {
  display: flex; gap: 12px; margin-top: 8px;
  font-size: 11px; color: var(--text-tertiary);
  font-family: 'JetBrains Mono', monospace; align-items: center;
}

.card-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
}

/* Phase-based badge colors */
.card-badge.development { background: rgba(59,130,246,0.12); color: #3b82f6; }
.card-badge.construction { background: rgba(249,115,22,0.12); color: #f97316; }
.card-badge.financing { background: rgba(168,85,247,0.12); color: #a855f7; }
.card-badge.operations { background: rgba(16,185,129,0.12); color: var(--status-active); }
.card-badge.general-corporate { background: rgba(107,114,128,0.12); color: var(--status-archived); }
.card-badge.active { background: rgba(16,185,129,0.1); color: var(--status-active); }
.card-badge.recent { background: rgba(245,158,11,0.1); color: var(--status-recent); }
.card-badge.archived { background: rgba(107,114,128,0.1); color: var(--status-archived); }

/* ============================================ Horizontal Stepper (standalone) */
.stepper-container {
  padding: 32px 24px 24px;
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--border-default);
  display: flex; justify-content: space-between; position: relative;
}

.stepper-line {
  position: absolute; top: 48px; left: 10%; right: 10%;
  height: 2px; background: var(--border-default); z-index: 1;
}
.stepper-line-fill {
  position: absolute; top: 48px; left: 10%;
  height: 2px; background: var(--accent-primary); z-index: 2; transition: width 0.4s ease;
}
.step {
  position: relative; z-index: 3;
  display: flex; flex-direction: column; align-items: center; gap: 8px; width: 20%;
}
.step-circle {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg-elevated); border: 2px solid var(--border-emphasis);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text-tertiary); transition: all 0.3s;
}
.step.completed .step-circle { background: var(--status-active); border-color: var(--status-active); color: white; }
.step.active .step-circle { border-color: var(--accent-primary); color: var(--accent-primary); box-shadow: 0 0 0 4px rgba(59,130,246,0.15); background: var(--bg-elevated); }
.step-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-align: center; text-transform: uppercase; }
.step.completed .step-label { color: var(--text-primary); }
.step.active .step-label { color: var(--accent-primary); }

/* ============================================ Vertical Stepper (right panel) */
.stepper-vertical { display: flex; flex-direction: column; gap: 0; }

.step-v { display: flex; align-items: flex-start; gap: 10px; }

.step-v-left {
  display: flex; flex-direction: column; align-items: center;
  width: 22px; flex-shrink: 0;
}
.step-v-circle {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg-elevated); border: 2px solid var(--border-emphasis);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--text-tertiary); flex-shrink: 0; transition: all 0.3s;
}
.step-v.completed .step-v-circle { background: var(--status-active); border-color: var(--status-active); color: white; }
.step-v.active .step-v-circle { border-color: var(--accent-primary); color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); background: var(--bg-elevated); }

.step-v-line {
  width: 2px; min-height: 14px; flex: 1;
  background: var(--border-default); margin: 2px 0;
}
.step-v.completed .step-v-line { background: var(--status-active); }

.step-v-content { padding: 2px 0 14px 0; flex: 1; }
.step-v:last-child .step-v-content { padding-bottom: 0; }

.step-v-label { font-size: 12px; font-weight: 600; color: var(--text-tertiary); line-height: 1.3; }
.step-v.completed .step-v-label { color: var(--text-primary); }
.step-v.active .step-v-label { color: var(--accent-primary); }

/* ============================================ Construction KPI Dashboard (standalone) */
.construction-dashboard {
  padding: 32px 24px;
  background: var(--bg-elevated); border-bottom: 1px solid var(--border-default);
  display: flex; gap: 40px; align-items: center;
}

.kpi-ring-container {
  position: relative; width: 140px; height: 140px; border-radius: 50%;
  background: conic-gradient(var(--accent-primary) var(--progress, 0%), var(--border-default) 0);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; box-shadow: var(--shadow-md);
}
.kpi-ring-inner {
  width: 116px; height: 116px; border-radius: 50%;
  background: var(--bg-elevated);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.kpi-value { font-size: 32px; font-weight: 700; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
.kpi-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }

.milestones-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 32px; flex: 1; }

.milestone-item {
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
}
.milestone-checkbox {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--border-emphasis);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: transparent; transition: all 0.2s;
  background: var(--surface-card); flex-shrink: 0;
}
.milestone-item.done .milestone-checkbox { background: var(--status-active); border-color: var(--status-active); color: white; }
.milestone-item.done span { color: var(--text-primary); }
.milestone-weight {
  font-size: 11px; font-weight: 600; color: var(--text-tertiary);
  background: var(--surface-hover); padding: 2px 8px; border-radius: 12px; margin-left: auto; flex-shrink: 0;
}

/* ============================================ Right Project Panel */
.project-right-panel {
  background: var(--bg-elevated);
  border-left: 1px solid var(--border-default);
  height: calc(100vh - 120px);
  overflow-y: auto; overflow-x: hidden;
  display: flex; flex-direction: column;
  width: 300px;
  transition: width 0.3s ease;
  scrollbar-width: thin;
  scrollbar-color: var(--border-emphasis) transparent;
}
.project-right-panel::-webkit-scrollbar { width: 4px; }
.project-right-panel::-webkit-scrollbar-track { background: transparent; }
.project-right-panel::-webkit-scrollbar-thumb { background: var(--border-emphasis); border-radius: 2px; }

.project-right-panel.collapsed { width: 40px; overflow: hidden; }

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 12px 12px;
  border-bottom: 1px solid var(--border-default);
  position: sticky; top: 0; background: var(--bg-elevated); z-index: 5; gap: 8px;
}
.panel-project-name {
  font-size: 12px; font-weight: 700; color: var(--text-primary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.panel-collapse-btn {
  width: 26px; height: 26px; border-radius: 5px;
  border: 1px solid var(--border-default);
  background: var(--surface-card); color: var(--text-secondary);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; transition: all 0.2s; font-family: inherit;
}
.panel-collapse-btn:hover { background: var(--surface-hover); border-color: var(--border-emphasis); color: var(--text-primary); }

.project-right-panel.collapsed .panel-project-name { display: none; }

.collapsed-hint {
  display: none; writing-mode: vertical-rl;
  font-size: 10px; font-weight: 700; color: var(--text-tertiary);
  padding: 12px 0; cursor: pointer;
  letter-spacing: 0.08em; text-transform: uppercase; text-align: center; width: 100%;
}
.project-right-panel.collapsed .collapsed-hint { display: block; }

.panel-body { padding: 0; flex: 1; }
.project-right-panel.collapsed .panel-body { display: none; }

.panel-section { padding: 16px; border-bottom: 1px solid var(--border-default); }
.panel-section:last-child { border-bottom: none; }

.panel-section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-tertiary); margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
}

/* KPI ring inside right panel */
.panel-kpi-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.panel-kpi-wrap .kpi-ring-container { width: 80px; height: 80px; }
.panel-kpi-wrap .kpi-ring-inner { width: 64px; height: 64px; }
.panel-kpi-wrap .kpi-value { font-size: 18px; }
.panel-kpi-wrap .kpi-label { font-size: 9px; }

.panel-milestones { display: flex; flex-direction: column; gap: 8px; width: 100%; }

.panel-milestone-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-secondary);
}
.panel-milestone-item .milestone-checkbox { width: 16px; height: 16px; border-radius: 4px; font-size: 9px; flex-shrink: 0; }
.panel-milestone-item .m-name { flex: 1; line-height: 1.3; }
.panel-milestone-item .m-pct { font-weight: 700; font-size: 11px; flex-shrink: 0; }
.panel-milestone-item.done .m-pct { color: var(--status-active); }
.panel-milestone-item:not(.done) .m-pct { color: var(--accent-primary); }

/* Not started construction state */
.construction-not-started {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; padding: 16px 0; color: var(--text-tertiary); text-align: center;
}
.construction-not-started .ns-icon { font-size: 28px; opacity: 0.4; }
.construction-not-started p { font-size: 12px; font-weight: 500; }

/* Operation in panel */
.panel-op-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 0; color: var(--text-tertiary); text-align: center; }
.panel-op-placeholder .op-icon { font-size: 24px; opacity: 0.4; }
.panel-op-placeholder p { font-size: 12px; font-weight: 500; }

.panel-op-status {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; background: rgba(16,185,129,0.1);
  color: var(--status-active); border-radius: 6px; font-size: 12px; font-weight: 600;
}

/* ============================================ Detail Panel */
.detail-panel { background: var(--bg-primary); overflow-y: auto; height: calc(100vh - 120px); }

.detail-header { background: var(--bg-elevated); padding: 24px; border-bottom: 1px solid var(--border-default); }

.detail-header h2 { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; line-height: 1.3; }

.detail-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
.detail-meta-item { display: flex; align-items: center; gap: 6px; }

/* ============================================ Tabs */
.tabs { display: flex; gap: 2px; background: var(--bg-elevated); border-bottom: 1px solid var(--border-default); padding: 0 24px; }
.tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent-primary); border-bottom-color: var(--accent-primary); }
.tab-content { display: none; padding: 24px; }
.tab-content.active { display: block; }

/* ============================================ Section / Email / Summary */
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-tertiary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section-divider { height: 1px; background: var(--border-default); margin: 32px 0; }

.email-list { display: flex; flex-direction: column; gap: 12px; }
.email-item { background: var(--surface-card); border: 1px solid var(--border-default); border-radius: 8px; padding: 16px; text-decoration: none; color: inherit; transition: all 0.2s; display: block; }
.email-item:hover { border-color: var(--accent-primary); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.email-item-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px; gap: 12px; }
.email-item-title { font-size: 13px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
.email-item-icon { font-size: 16px; }
.email-item-meta { display: grid; grid-template-columns: auto 1fr; gap: 8px 12px; font-size: 11px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }
.email-meta-label { color: var(--text-tertiary); font-weight: 500; }
.email-meta-value { color: var(--text-secondary); }

.summary-section { margin-bottom: 32px; }
.summary-section h3 { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; }
.summary-section p, .summary-section pre { font-size: 13px; line-height: 1.6; color: var(--text-secondary); white-space: pre-wrap; font-family: inherit; }

/* ============================================ Tasks Table */
.tasks-table-wrapper { overflow-x: auto; border: 1px solid var(--border-default); border-radius: 8px; }
.tasks-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.tasks-table thead { background: var(--surface-card); border-bottom: 1px solid var(--border-default); }
.tasks-table th { padding: 12px 16px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); }
.tasks-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-default); color: var(--text-secondary); }
.tasks-table tr:last-child td { border-bottom: none; }
.tasks-table tr:hover { background: var(--surface-hover); }
.task-status { display: inline-flex; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.task-status.done { background: rgba(16,185,129,0.1); color: var(--status-active); }
.task-status.todo { background: rgba(245,158,11,0.1); color: var(--status-recent); }
.task-description { color: var(--text-primary); font-weight: 500; }
.task-responsible { color: var(--accent-primary); font-weight: 500; }

/* ============================================ Master Task View */
#masterTaskView {
  display: none; padding: 24px;
  background: var(--bg-primary); flex: 1;
  overflow-y: auto; height: calc(100vh - 120px);
}
#masterTaskView.active { display: block; grid-column: 1 / -1; }

.master-task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.master-task-header h2 { font-size: 20px; color: var(--text-primary); }

/* Project color tags */
.tag-color-0 { background: #e0e7ff; color: #3730a3; border-color: #c7d2fe; }
.tag-color-1 { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
.tag-color-2 { background: #ffedd5; color: #9a3412; border-color: #fed7aa; }
.tag-color-3 { background: #fae8ff; color: #86198f; border-color: #f5d0fe; }
.tag-color-4 { background: #cffafe; color: #155e75; border-color: #a5f3fc; }
.tag-color-5 { background: #fce7f3; color: #9d174d; border-color: #fbcfe8; }
.tag-color-6 { background: #fef9c3; color: #854d0e; border-color: #fef08a; }

body.dark-mode .tag-color-0 { background: rgba(99,102,241,0.2); color: #a5b4fc; border-color: rgba(99,102,241,0.3); }
body.dark-mode .tag-color-1 { background: rgba(34,197,94,0.2); color: #86efac; border-color: rgba(34,197,94,0.3); }
body.dark-mode .tag-color-2 { background: rgba(249,115,22,0.2); color: #fdba74; border-color: rgba(249,115,22,0.3); }
body.dark-mode .tag-color-3 { background: rgba(217,70,239,0.2); color: #f0abfc; border-color: rgba(217,70,239,0.3); }
body.dark-mode .tag-color-4 { background: rgba(6,182,212,0.2); color: #67e8f9; border-color: rgba(6,182,212,0.3); }
body.dark-mode .tag-color-5 { background: rgba(236,72,153,0.2); color: #f9a8d4; border-color: rgba(236,72,153,0.3); }
body.dark-mode .tag-color-6 { background: rgba(234,179,8,0.2); color: #fde047; border-color: rgba(234,179,8,0.3); }

/* Master tasks table */
.master-tasks-table-wrapper { overflow-x: auto; border: 1px solid var(--border-default); border-radius: 8px; background: var(--surface-card); }
.master-tasks-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.master-tasks-table thead { position: sticky; top: 0; z-index: 10; background: var(--surface-card); }
.master-tasks-table th { padding: 12px 16px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); border-bottom: 2px solid var(--border-default); white-space: nowrap; }
.master-tasks-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-default); color: var(--text-secondary); vertical-align: top; }
.master-tasks-table tr:hover { background: var(--surface-hover); }

.project-badge { display: inline-block; padding: 4px 10px; background: rgba(37,99,235,0.1); color: var(--accent-primary); border-radius: 4px; font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.phase-badge { display: inline-block; padding: 4px 10px; background: rgba(16,185,129,0.1); color: var(--status-active); border-radius: 4px; font-size: 11px; font-weight: 600; }
.master-task-description { max-width: 400px; line-height: 1.5; color: var(--text-primary); }
.master-task-owner { font-weight: 600; color: var(--accent-primary); }
.master-task-deadline { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* ============================================ Attachments */
.attachments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.attachment-card { background: var(--surface-card); border: 1px solid var(--border-default); border-radius: 8px; padding: 16px; text-align: center; text-decoration: none; color: inherit; transition: all 0.2s; display: block; }
.attachment-card:hover { border-color: var(--accent-primary); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.attachment-icon { font-size: 32px; margin-bottom: 8px; }
.attachment-name { font-size: 11px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; word-break: break-word; }
.attachment-type { font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }

/* ============================================ Utilities */
.loading { text-align: center; padding: 60px 20px; color: var(--text-tertiary); font-size: 13px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); font-size: 13px; }
.error-msg { text-align: center; padding: 40px 20px; color: #dc2626; font-size: 13px; }

@media (max-width: 1023px) {
  .main-content { grid-template-columns: 1fr !important; }
  .sidebar { height: 300px; }
  .detail-panel { height: auto; }
  .project-right-panel { display: none !important; }
}
  
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">📧</div>
        <div class="logo-text">
          <h1>Email Intelligence</h1>
          <p>Project Management Platform</p>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:12px;">
      <button class="theme-toggle" id="taskViewBtn" title="Master Action Items">📋</button>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark / light mode">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filters" id="mainFilters">
    <div class="filter-group">
      <label>Time Period</label>
      <select id="timeFilter">
        <option value="1">Last Month</option>
        <option value="3">Last 3 Months</option>
        <option value="6">Last 6 Months</option>
        <option value="12">Last 12 Months</option>
        <option value="all">All Time</option>
      </select>
    </div>
    <!-- PROJECT dropdown hidden — use project chip bar below -->
    <div class="filter-group hidden">
      <label>Project</label>
      <select id="projectSelect"><option value="">All Projects</option></select>
    </div>
    <div class="filter-group">
      <label>Phase</label>
      <select id="phaseFilter"><option value="">All Phases</option></select>
    </div>
    <div class="filter-group">
      <label>Category</label>
      <select id="categoryFilter"><option value="">All Categories</option></select>
    </div>
    <div class="filter-group">
      <label>Status</label>
      <select id="statusFilter">
        <option value="">All</option>
        <option value="Active">Active</option>
        <option value="Recent">Recent</option>
        <option value="Archived">Archived</option>
      </select>
    </div>
    <div class="filter-group">
      <label>&nbsp;</label>
      <button class="refresh-btn" id="refreshBtn">Refresh</button>
    </div>
  </div>

  <!-- Project Chip Bar -->
  <div class="project-bar-wrapper" id="projectBarWrapper">
    <div id="projectBar" class="project-bar">
      <button class="project-chip active" data-project="">All Projects</button>
    </div>
  </div>

  <!-- Main Content: sidebar | detail | right-panel -->
  <div class="main-content" id="mainContent">

    <!-- Master Task View (spans all columns when active) -->
    <div id="masterTaskView">
      <div class="master-task-header">
        <h2>Master Action Items</h2>
        <span id="taskCount" class="task-status todo">0 Pending</span>
      </div>
      <div class="master-tasks-table-wrapper">
        <table class="master-tasks-table" id="masterTaskTable">
          <thead>
            <tr>
              <th data-sort="project" style="cursor:pointer;" title="Sort">Project ↕️</th>
              <th data-sort="phase" style="cursor:pointer;" title="Sort">Phase ↕️</th>
              <th data-sort="category" style="cursor:pointer;" title="Sort">Category ↕️</th>
              <th data-sort="description" style="cursor:pointer;" title="Sort">Task Description ↕️</th>
              <th data-sort="owner" style="cursor:pointer;" title="Sort">Owner ↕️</th>
              <th data-sort="deadline" style="cursor:pointer;" title="Sort">Deadline ↕️</th>
            </tr>
          </thead>
          <tbody id="masterTasksTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Email Card Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="loading">Loading...</div>
    </div>

    <!-- Email Detail Panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="empty-state" style="padding:120px 40px;">
        Select a card to view details
      </div>
    </div>

    <!-- Project Right Panel (shown when a project chip is selected) -->
    <div id="projectDashboard" class="project-right-panel" style="display:none;">
      <div class="panel-header">
        <span class="panel-project-name" id="panelProjectName"></span>
        <span class="collapsed-hint" onclick="toggleProjectPanel()">KPIs</span>
        <button class="panel-collapse-btn" id="panelCollapseBtn" onclick="toggleProjectPanel()" title="Collapse panel">‹</button>
      </div>
      <div class="panel-body" id="panelBody"></div>
    </div>

  </div>
</div>
<script>
// JavaScript_Frontend.gs - inlined
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxm8cY1h0vzlvL_-0Rg8mJUurwfbF1ANnKuKUZ0MXE5KYmtpuqbYFqcbCQuX-bHYjT8uQ/exec";

let allData = [];
let allEmails = [];
let allProjects = [];
let activeProject = null;

// ============================================
// HELPERS
// ============================================

function esc(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/** Format ISO/raw date string → "31 Jan 2026" */
function formatDate(str) {
  if (!str) return 'N/A';
  const d = new Date(str);
  if (isNaN(d.getTime())) return str;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

/** Replace underscores with spaces for display */
function formatProjectName(name) {
  return (name || '').replace(/_/g, ' ');
}

/** Map phase string → CSS class name */
function getPhaseClass(phase) {
  const p = (phase || '').toLowerCase();
  if (p.includes('development'))           return 'development';
  if (p.includes('construction'))          return 'construction';
  if (p.includes('financ'))               return 'financing';
  if (p.includes('operat'))               return 'operations';
  if (p.includes('general') || p.includes('corporate')) return 'general-corporate';
  return 'active';
}

/** Short phase label for badge */
function phaseLabel(phase) {
  const p = (phase || '').toLowerCase();
  if (p.includes('development'))  return 'Dev';
  if (p.includes('construction')) return 'Const';
  if (p.includes('financ'))       return 'Finance';
  if (p.includes('operat'))       return 'Ops';
  if (p.includes('general') || p.includes('corporate')) return 'Corp';
  return phase || 'Active';
}

function getProjectColorClass(str) {
  let hash = 0;
  for (let i = 0; i < (str || '').length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return 'tag-color-' + Math.abs(hash % 7);
}

function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('darkMode', isDark);
  document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
}

// ============================================
// DATA LOADING
// ============================================

async function loadData() {
  document.getElementById('sidebar').innerHTML = '<div class="loading">Loading...</div>';

  try {
    const [summariesRes, emailsRes, projectsRes] = await Promise.all([
      fetch(SCRIPT_URL + '?action=getSummaries'),
      fetch(SCRIPT_URL + '?action=getEmails'),
      fetch(SCRIPT_URL + '?action=getProjects').catch(() => null)
    ]);

    const summariesResult = await summariesRes.json();
    if (!summariesResult.success) throw new Error(summariesResult.error);
    allData = summariesResult.data || [];

    const emailsResult = await emailsRes.json();
    if (emailsResult.success) allEmails = emailsResult.data || [];

    if (projectsRes) {
      try {
        const projectsResult = await projectsRes.json();
        if (projectsResult.success) allProjects = projectsResult.data || [];
      } catch(e) { allProjects = []; }
    }

    renderProjectBar();

    if (allData.length === 0) {
      document.getElementById('sidebar').innerHTML =
        '<div class="empty-state">No data. Run Smart Process in Google Sheet.</div>';
      return;
    }

    const projects   = [...new Set(allData.map(i => i.project))].filter(Boolean).sort();
    const phases     = [...new Set(allData.map(i => i.phase))].filter(Boolean).sort();
    const categories = [...new Set(allData.map(i => i.category))].filter(Boolean).sort();

    document.getElementById('projectSelect').innerHTML =
      '<option value="">All Projects</option>' +
      projects.map(p => '<option>' + esc(p) + '</option>').join('');

    document.getElementById('phaseFilter').innerHTML =
      '<option value="">All Phases</option>' +
      phases.map(p => '<option>' + esc(p) + '</option>').join('');

    document.getElementById('categoryFilter').innerHTML =
      '<option value="">All Categories</option>' +
      categories.map(c => '<option>' + esc(c) + '</option>').join('');

    displayCards();
    await initMasterTasks();

  } catch (error) {
    document.getElementById('sidebar').innerHTML =
      '<div class="error-msg">Error: ' + esc(error.message) + '</div>';
  }
}

// ============================================
// CARD LIST
// ============================================

function displayCards() {
  const timeMonths = document.getElementById('timeFilter').value;
  const project    = document.getElementById('projectSelect').value;
  const phase      = document.getElementById('phaseFilter').value;
  const category   = document.getElementById('categoryFilter').value;
  const status     = document.getElementById('statusFilter').value;

  let filtered = allData;

  if (timeMonths !== 'all') {
    const cutoff = new Date();
    cutoff.setMonth(cutoff.getMonth() - parseInt(timeMonths));
    filtered = filtered.filter(i => !i.last_updated || new Date(i.last_updated) >= cutoff);
  }

  if (activeProject) {
    filtered = filtered.filter(i => i.project === activeProject);
  } else if (project) {
    filtered = filtered.filter(i => i.project === project);
  }

  if (phase)    filtered = filtered.filter(i => i.phase === phase);
  if (category) filtered = filtered.filter(i => i.category === category);
  if (status)   filtered = filtered.filter(i => i.status === status);

  filtered.sort((a, b) => {
    const pa = (a.project || '').toLowerCase(), pb = (b.project || '').toLowerCase();
    if (pa !== pb) return pa.localeCompare(pb);
    const pha = (a.phase || '').toLowerCase(), phb = (b.phase || '').toLowerCase();
    if (pha !== phb) return pha.localeCompare(phb);
    return (a.category || '').toLowerCase().localeCompare((b.category || '').toLowerCase());
  });

  if (filtered.length === 0) {
    document.getElementById('sidebar').innerHTML = '<div class="empty-state">No matches found</div>';
    return;
  }

  let html = '';
  filtered.forEach((item, idx) => {
    const phClass = getPhaseClass(item.phase);
    const emailWord = item.email_count === 1 ? 'email' : 'emails';
    html +=
      '<div class="card" data-idx="' + idx + '">' +
        '<div class="card-header">' +
          '<div class="card-status ' + phClass + '"></div>' +
          '<div class="card-title">' +
            esc(item.project) + ' › ' + esc(item.phase || '—') + ' › ' + esc(item.category) +
          '</div>' +
        '</div>' +
        '<div class="card-meta">' +
          '<span>' + item.email_count + ' ' + emailWord + '</span>' +
          '<span class="card-badge ' + phClass + '">' + esc(phaseLabel(item.phase)) + '</span>' +
        '</div>' +
      '</div>';
  });

  document.getElementById('sidebar').innerHTML = html;

  document.querySelectorAll('.card').forEach((card, idx) => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      showDetail(filtered[idx]);
    });
  });

  if (filtered.length > 0) document.querySelector('.card').click();
}

// ============================================
// DETAIL PANEL
// ============================================

function showDetail(item) {
  const emailLinks  = getEmailLinks(item);
  const tasks       = extractTasks(item);
  const attachments = extractAttachments(item);

  // ── Files & Emails tab ──
  let emailsHTML = '';
  if (emailLinks.length > 0) {
    emailsHTML = '<div class="section-title">📧 Related Emails (' + emailLinks.length + ')</div>';
    emailsHTML += '<div class="email-list">';
    emailLinks.forEach((email, i) => {
      emailsHTML +=
        '<a href="' + email.url + '" target="_blank" class="email-item">' +
          '<div class="email-item-header">' +
            '<div class="email-item-title">' +
              '<span class="email-item-icon">📩</span>' +
              esc(email.sender) +
            '</div>' +
          '</div>' +
          '<div class="email-item-meta">' +
            '<div class="email-meta-label">Date:</div>' +
            '<div class="email-meta-value">' + esc(email.date) + (email.time ? ' · ' + esc(email.time) : '') + '</div>' +
          '</div>' +
        '</a>';
    });
    emailsHTML += '</div>';
  } else {
    emailsHTML = '<div class="section-title">📧 Related Emails</div><div class="empty-state">No emails found</div>';
  }

  let attachmentsHTML = '';
  if (attachments.length > 0) {
    attachmentsHTML = '<div class="section-divider"></div>';
    attachmentsHTML += '<div class="section-title">📎 Attachments</div>';
    attachmentsHTML += '<div class="attachments-grid">';
    attachments.forEach(att => {
      attachmentsHTML +=
        '<a href="' + att.url + '" target="_blank" class="attachment-card">' +
          '<div class="attachment-icon">' + att.icon + '</div>' +
          '<div class="attachment-name">' + esc(att.name) + '</div>' +
          '<div class="attachment-type">' + esc(att.type) + '</div>' +
        '</a>';
    });
    attachmentsHTML += '</div>';
  }

  // ── Tasks tab ──
  let tasksHTML = '';
  if (tasks.length > 0) {
    tasksHTML = '<div class="tasks-table-wrapper"><table class="tasks-table">';
    tasksHTML += '<thead><tr><th>Status</th><th>Task</th><th>Responsible</th></tr></thead><tbody>';
    tasks.forEach(t => {
      tasksHTML +=
        '<tr>' +
          '<td><span class="task-status ' + t.status + '">' + t.status + '</span></td>' +
          '<td class="task-description">' + esc(t.description) + '</td>' +
          '<td class="task-responsible">' + esc(t.responsible || '—') + '</td>' +
        '</tr>';
    });
    tasksHTML += '</tbody></table></div>';
  } else {
    tasksHTML = '<div class="empty-state">No tasks</div>';
  }

  const phClass = getPhaseClass(item.phase);

  document.getElementById('detailPanel').innerHTML =
    '<div class="detail-header">' +
      '<h2>' + esc(item.project) + ' › ' + esc(item.phase || '—') + ' › ' + esc(item.category) + '</h2>' +
      '<div class="detail-meta">' +
        '<div class="detail-meta-item">📧 ' + item.email_count + (item.email_count === 1 ? ' email' : ' emails') + '</div>' +
        '<div class="detail-meta-item">📅 ' + formatDate(item.time_period || item.last_updated) + '</div>' +
        '<div class="detail-meta-item"><span class="card-badge ' + phClass + '" style="font-size:11px;">' + esc(item.phase || item.status) + '</span></div>' +
      '</div>' +
    '</div>' +
    '<div class="tabs">' +
      '<div class="tab active" data-tab="summary">Summary</div>' +
      '<div class="tab" data-tab="tasks">Tasks</div>' +
      '<div class="tab" data-tab="files">Files & Emails</div>' +
    '</div>' +
    '<div class="tab-content active" id="summary-content">' +
      '<div class="summary-section"><h3>Executive Summary</h3><p>' + esc(item.executive_summary || 'No summary') + '</p></div>' +
      '<div class="summary-section"><h3>Key Points</h3><pre>' + esc(item.key_points || 'None') + '</pre></div>' +
      (item.risk_areas && item.risk_areas !== 'None identified' ?
        '<div class="summary-section"><h3>Risk Areas</h3><pre>' + esc(item.risk_areas) + '</pre></div>' : '') +
      '<div class="summary-section"><h3>Next Steps</h3><pre>' + esc(item.next_steps || 'None') + '</pre></div>' +
    '</div>' +
    '<div class="tab-content" id="tasks-content">' + tasksHTML + '</div>' +
    '<div class="tab-content" id="files-content">' + emailsHTML + attachmentsHTML + '</div>';

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      document.getElementById(this.dataset.tab + '-content').classList.add('active');
    });
  });
}

function getEmailLinks(item) {
  const links = [];
  const matches = allEmails.filter(e =>
    e.project === item.project && e.phase === item.phase && e.category === item.category
  );
  matches.forEach(email => {
    if (email.mail) {
      const urls = email.mail.match(/(https:\/\/docs\.google\.com\/[^\s<>"]+)/g);
      if (urls) {
        urls.forEach(url => {
          let dateObj = null, isValidDate = false;
          if (email.date) {
            const clean = String(email.date)
              .replace(/\s+at\s+/i, ' ')
              .replace(/\s+(EET|EST|EDT|PST|PDT|CET|CEST|UTC|GMT|MSK|JST|IST)\b/gi, '')
              .trim();
            dateObj = new Date(clean);
            isValidDate = !isNaN(dateObj.getTime());
          }
          links.push({
            url,
            sender: email.sender || 'Unknown',
            date: isValidDate
              ? dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
              : (email.date || 'N/A'),
            time: isValidDate
              ? dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
              : ''
          });
        });
      }
    }
  });
  return links;
}

function extractTasks(item) {
  const tasks = [];
  [
    { field: item.action_items, status: 'todo' },
    { field: item.completed_items, status: 'done' }
  ].forEach(({ field, status }) => {
    if (field && field !== 'None identified') {
      field.split('\n').forEach(line => {
        const clean = line.replace(/^[•\-*]\s*/, '').trim();
        if (clean.length > 3) {
          const owner    = clean.match(/\(Owner:\s*([^)]+)\)/i)?.[1] || clean.match(/\(([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)\)/)?.[1];
          const deadline = clean.match(/\((\d{4}-\d{2}-\d{2}|\d{1,2}\/\d{1,2}\/\d{2,4}|\w+\s+\d{1,2},?\s*\d{4}?)\)/i)?.[1];
          const desc     = clean.replace(/\([^)]+\)/g, '').trim();
          tasks.push({ status, description: desc || clean, responsible: owner || '', deadline: deadline || '' });
        }
      });
    }
  });
  return tasks;
}

function extractAttachments(item) {
  const attachments = [];
  const text = [item.executive_summary, item.key_points].join(' ');
  const urls = [...new Set(text.match(/(https?:\/\/[^\s<>"{}|\\^\[\]\` ]+)/gi) || [])];
  urls.forEach(url => {
    url = url.replace(/[.,;:!?)]+$/, '');
    let icon = '📄', type = 'Link', name = 'Document';
    if (url.includes('docs.google.com')) {
      if (url.includes('/spreadsheets/')) { icon = '📊'; type = 'Sheets'; name = 'Spreadsheet'; }
      else if (url.includes('/document/'))     { icon = '📝'; type = 'Docs';   name = 'Document'; }
      else if (url.includes('/presentation/')) { icon = '📊'; type = 'Slides'; name = 'Presentation'; }
      else { icon = '📁'; type = 'Drive'; name = 'File'; }
    } else if (url.match(/\.(pdf|PDF)($|\?)/)) {
      icon = '📕'; type = 'PDF'; name = 'PDF';
    }
    attachments.push({ url, icon, type, name });
  });
  return attachments;
}

// ============================================
// PROJECT BAR
// ============================================

function renderProjectBar() {
  const bar = document.getElementById('projectBar');
  if (!bar) return;

  // Derive project names from allData (summaries); enrich with allProjects when available
  const projectsFromData = [...new Set(allData.map(i => i.project).filter(Boolean))].sort();
  const projectsMap = {};
  allProjects.forEach(p => { if (p.project) projectsMap[p.project] = p; });

  let html = '<button class="project-chip' + (!activeProject ? ' active' : '') +
             '" data-project="">All Projects</button>';

  projectsFromData.forEach(name => {
    const isActive = activeProject === name;
    const displayName = formatProjectName(name);
    html +=
      '<button class="project-chip' + (isActive ? ' active' : '') +
      '" data-project="' + esc(name) + '">' +
        esc(displayName) +
      '</button>';
  });

  bar.innerHTML = html;
  bar.querySelectorAll('.project-chip').forEach(chip => {
    chip.addEventListener('click', () => selectProject(chip.dataset.project || null));
  });
}

function selectProject(name) {
  activeProject = name || null;
  renderProjectBar();
  if (isTaskView) {
    renderMasterTasks();
  } else {
    renderProjectDashboard();
    displayCards();
  }
}

// ============================================
// PROJECT RIGHT PANEL
// ============================================

function toggleProjectPanel() {
  const panel = document.getElementById('projectDashboard');
  const btn   = document.getElementById('panelCollapseBtn');
  if (!panel) return;
  panel.classList.toggle('collapsed');
  if (btn) btn.textContent = panel.classList.contains('collapsed') ? '›' : '‹';
}

function renderProjectDashboard() {
  const panel      = document.getElementById('projectDashboard');
  const mainContent = document.getElementById('mainContent');
  const panelBody  = document.getElementById('panelBody');
  const nameEl     = document.getElementById('panelProjectName');
  if (!panel) return;

  if (!activeProject) {
    panel.style.display = 'none';
    mainContent.classList.remove('has-project-panel');
    return;
  }

  const project = allProjects.find(p => p.project === activeProject) || {};

  if (nameEl) nameEl.textContent = formatProjectName(activeProject);

  // ── Development ──
  const stageIndex = parseInt(project.dev_stage_index) || 0;
  const devHTML = getVerticalStepperHTML(stageIndex);

  // ── Construction ──
  const allZero = !parseFloat(project.civil_works_pct) &&
                  !parseFloat(project.pv_ramming_pct) &&
                  !parseFloat(project.pv_mounting_pct) &&
                  !parseFloat(project.bess_pct) &&
                  !parseFloat(project.electrical_pct) &&
                  !parseFloat(project.commissioning_pct);
  const constructionHTML = allZero
    ? '<div class="construction-not-started"><div class="ns-icon">🏗️</div><p>Not started yet</p></div>'
    : getPanelConstructionHTML(project);

  // ── Operation ──
  const opStatus = project.operation_status &&
                   project.operation_status !== '—' &&
                   project.operation_status !== ''
    ? '<div class="panel-op-status">🔋 ' + esc(String(project.operation_status)) + '</div>'
    : '<div class="panel-op-placeholder"><div class="op-icon">🔌</div><p>Coming Soon</p></div>';

  panelBody.innerHTML =
    '<div class="panel-section">' +
      '<div class="panel-section-title">🏗️ Development</div>' +
      devHTML +
    '</div>' +
    '<div class="panel-section">' +
      '<div class="panel-section-title">⚙️ Construction</div>' +
      constructionHTML +
    '</div>' +
    '<div class="panel-section">' +
      '<div class="panel-section-title">⚡ Operation</div>' +
      opStatus +
    '</div>';

  panel.style.display = 'flex';
  mainContent.classList.add('has-project-panel');
}

/** Vertical stepper for the right panel */
function getVerticalStepperHTML(stageIndex) {
  const steps = [
    { name: 'Land & Prep',    icon: '📍' },
    { name: 'Environment',    icon: '🌍' },
    { name: 'Grid Sync',      icon: '⚡' },
    { name: 'Tech Design',    icon: '📐' },
    { name: 'Permitting',     icon: '🏛️' }
  ];
  const current = parseInt(stageIndex) || 0;
  let html = '<div class="stepper-vertical">';
  steps.forEach((step, idx) => {
    const isLast    = idx === steps.length - 1;
    let statusClass = '';
    let icon        = step.icon;
    if (idx < current)      { statusClass = 'completed'; icon = '✓'; }
    else if (idx === current) { statusClass = 'active'; }

    html +=
      '<div class="step-v ' + statusClass + '">' +
        '<div class="step-v-left">' +
          '<div class="step-v-circle">' + icon + '</div>' +
          (!isLast ? '<div class="step-v-line"></div>' : '') +
        '</div>' +
        '<div class="step-v-content">' +
          '<div class="step-v-label">' + step.name + '</div>' +
        '</div>' +
      '</div>';
  });
  html += '</div>';
  return html;
}

/** Compact construction KPI for the right panel */
function getPanelConstructionHTML(project) {
  const milestones = [
    { name: 'Civil Works',   pct: parseInt(project.civil_works_pct)   || 0 },
    { name: 'PV Ramming',    pct: parseInt(project.pv_ramming_pct)    || 0 },
    { name: 'PV Mounting',   pct: parseInt(project.pv_mounting_pct)   || 0 },
    { name: 'BESS Delivery', pct: parseInt(project.bess_pct)          || 0 },
    { name: 'Electrical',    pct: parseInt(project.electrical_pct)    || 0 },
    { name: 'Commissioning', pct: parseInt(project.commissioning_pct) || 0 }
  ];
  const weights = [5, 10, 15, 40, 20, 10];

  let total = 0;
  milestones.forEach((m, i) => { total += (m.pct / 100) * weights[i]; });
  total = Math.round(total);

  let listHTML = '<div class="panel-milestones">';
  milestones.forEach(m => {
    const isDone      = m.pct === 100;
    const inProgress  = m.pct > 0 && m.pct < 100;
    const icon        = isDone ? '✓' : (inProgress ? '↻' : '');
    const borderStyle = inProgress ? 'border-color:var(--accent-primary);color:var(--accent-primary);' : '';
    listHTML +=
      '<div class="panel-milestone-item ' + (isDone ? 'done' : '') + '">' +
        '<div class="milestone-checkbox" style="' + borderStyle + '">' + icon + '</div>' +
        '<span class="m-name">' + m.name + '</span>' +
        '<span class="m-pct">' + m.pct + '%</span>' +
      '</div>';
  });
  listHTML += '</div>';

  return '<div class="panel-kpi-wrap">' +
    '<div class="kpi-ring-container" style="--progress:' + total + '%;">' +
      '<div class="kpi-ring-inner">' +
        '<div class="kpi-value">' + total + '%</div>' +
        '<div class="kpi-label">Done</div>' +
      '</div>' +
    '</div>' +
    listHTML +
  '</div>';
}

/** Horizontal stepper (kept for any standalone use) */
function getDevelopmentStepperHTML(stageIndex) {
  const steps = [
    { name: 'Land & Prep', icon: '📍' },
    { name: 'Environment', icon: '🌍' },
    { name: 'Grid Sync',   icon: '⚡' },
    { name: 'Tech Design', icon: '📐' },
    { name: 'Permitting',  icon: '🏛️' }
  ];
  const current   = parseInt(stageIndex) || 0;
  const fillWidth = current === 0 ? 0 : (current / (steps.length - 1)) * 100;

  let html = '<div class="stepper-container">' +
    '<div class="stepper-line"></div>' +
    '<div class="stepper-line-fill" style="width:calc(' + fillWidth + '% * 0.8);"></div>';

  steps.forEach((step, idx) => {
    let statusClass = '', icon = step.icon;
    if (idx < current)      { statusClass = 'completed'; icon = '✓'; }
    else if (idx === current) { statusClass = 'active'; }
    html +=
      '<div class="step ' + statusClass + '">' +
        '<div class="step-circle">' + icon + '</div>' +
        '<div class="step-label">' + step.name + '</div>' +
      '</div>';
  });
  html += '</div>';
  return html;
}

// ============================================
// MASTER TASKS
// ============================================

let isTaskView   = false;
let taskSortCol  = 'project';
let taskSortAsc  = true;
let phaseCategories = {};

document.querySelectorAll('#masterTaskTable th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.getAttribute('data-sort');
    if (taskSortCol === col) { taskSortAsc = !taskSortAsc; }
    else { taskSortCol = col; taskSortAsc = true; }
    renderMasterTasks();
  });
});

function renderMasterTasks() {
  const timeMonths = document.getElementById('timeFilter').value;
  const phase      = document.getElementById('phaseFilter').value;
  const category   = document.getElementById('categoryFilter').value;
  const status     = document.getElementById('statusFilter').value;

  let allPendingTasks = [];
  allData.forEach(item => {
    // Status filter: default to excluding Archived unless user explicitly picks it
    if (!status && item.status === 'Archived') return;
    if (status && item.status !== status) return;
    if (timeMonths !== 'all') {
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - parseInt(timeMonths));
      if (item.last_updated && new Date(item.last_updated) < cutoff) return;
    }
    // Project: use chip bar activeProject (takes priority), else hidden projectSelect
    const projectFilter = activeProject || document.getElementById('projectSelect').value;
    if (projectFilter && item.project !== projectFilter) return;
    if (phase    && item.phase    !== phase)    return;
    if (category && item.category !== category) return;

    extractTasks(item).forEach(task => {
      if (task.status === 'todo') {
        allPendingTasks.push({
          project: item.project, phase: item.phase, category: item.category,
          description: task.description, owner: task.responsible || '—', deadline: task.deadline || '—'
        });
      }
    });
  });

  allPendingTasks.sort((a, b) => {
    const va = (a[taskSortCol] || '').toLowerCase();
    const vb = (b[taskSortCol] || '').toLowerCase();
    if (va < vb) return taskSortAsc ? -1 : 1;
    if (va > vb) return taskSortAsc ?  1 : -1;
    return 0;
  });

  document.getElementById('taskCount').textContent = allPendingTasks.length + ' Pending Tasks';

  const tbody = document.getElementById('masterTasksTableBody');
  if (allPendingTasks.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;">No pending tasks! 🎉</td></tr>';
    return;
  }

  let rowsHtml = '';
  allPendingTasks.forEach(task => {
    rowsHtml +=
      '<tr>' +
        '<td><span class="project-badge ' + getProjectColorClass(task.project) + '">' + esc(formatProjectName(task.project)) + '</span></td>' +
        '<td><span class="phase-badge">' + esc(task.phase || '—') + '</span></td>' +
        '<td style="font-size:11px;color:var(--text-tertiary);">' + esc(task.category) + '</td>' +
        '<td class="master-task-description">' + esc(task.description) + '</td>' +
        '<td class="master-task-owner">' + esc(task.owner) + '</td>' +
        '<td class="master-task-deadline">' + esc(task.deadline) + '</td>' +
      '</tr>';
  });
  tbody.innerHTML = rowsHtml;
}

async function loadCategoryReference() {
  try {
    const response = await fetch(SCRIPT_URL + '?action=getCategoryReference');
    const result   = await response.json();
    if (result.success) phaseCategories = result.data;
  } catch (e) { phaseCategories = {}; }
}

function getAllPhases() { return Object.keys(phaseCategories).sort(); }
function getCategoriesForPhase(phase) { return phaseCategories[phase] || []; }

function displayMasterTasks() {
  try {
    const tasks = buildMasterTasksTable();
    const pf  = document.getElementById('masterProjectFilter').value;
    const phf = document.getElementById('masterPhaseFilter').value;
    const cf  = document.getElementById('masterCategoryFilter').value;

    let filtered = tasks;
    if (pf)  filtered = filtered.filter(t => t.project  === pf);
    if (phf) filtered = filtered.filter(t => t.phase    === phf);
    if (cf)  filtered = filtered.filter(t => t.category === cf);

    document.getElementById('taskCount').textContent = filtered.length + ' PENDING TASKS';

    if (filtered.length === 0) {
      document.getElementById('masterTasksTableBody').innerHTML =
        '<tr><td colspan="6" style="text-align:center;padding:60px;color:var(--text-tertiary);">No pending tasks found</td></tr>';
      return;
    }

    let html = '';
    filtered.forEach(task => {
      html +=
        '<tr>' +
          '<td><span class="project-badge">' + esc(formatProjectName(task.project)) + '</span></td>' +
          '<td><span class="phase-badge">' + esc(task.phase) + '</span></td>' +
          '<td>' + esc(task.category) + '</td>' +
          '<td class="master-task-description">' + esc(task.description) + '</td>' +
          '<td class="master-task-owner">' + esc(task.owner || '—') + '</td>' +
          '<td class="master-task-deadline">' + esc(task.deadline || '—') + '</td>' +
        '</tr>';
    });
    document.getElementById('masterTasksTableBody').innerHTML = html;
  } catch (error) {
    document.getElementById('masterTasksTableBody').innerHTML =
      '<tr><td colspan="6" style="text-align:center;padding:40px;color:#dc2626;">Error: ' + error.message + '</td></tr>';
  }
}

function buildMasterTasksTable() {
  const allTasks = [];
  allData.forEach(item => {
    if (item.action_items && item.action_items !== 'None identified') {
      const lines = item.action_items.split('\n').filter(l => l.trim());
      lines.forEach(line => {
        const cleaned = line.replace(/^[•\-*]\s*/, '').trim();
        if (cleaned.length > 3) {
          const ownerMatch    = cleaned.match(/\(Owner:\s*([^)]+)\)/i) || cleaned.match(/\(([A-Z][a-z]+(?:\s+[A-Z][a-z]+)?)\)/);
          const deadlineMatch = cleaned.match(/\((\d{4}-\d{2}-\d{2}|\d{1,2}\/\d{1,2}\/\d{2,4}|\w+\s+\d{1,2},?\s*\d{4}?)\)/i);
          const description   = cleaned.replace(/\([^)]+\)/g, '').trim();
          allTasks.push({
            project: item.project, phase: item.phase || 'Unknown', category: item.category,
            description: description || cleaned,
            owner: ownerMatch ? ownerMatch[1].trim() : '',
            deadline: deadlineMatch ? deadlineMatch[1] : ''
          });
        }
      });
    }
  });
  return allTasks;
}

function onPhaseFilterChange() {
  const selectedPhase  = document.getElementById('masterPhaseFilter').value;
  const categorySelect = document.getElementById('masterCategoryFilter');
  if (!selectedPhase) {
    const all = [...new Set(allData.map(i => i.category))].filter(Boolean).sort();
    categorySelect.innerHTML = '<option value="">All Categories</option>' + all.map(c => '<option>' + esc(c) + '</option>').join('');
  } else {
    const cats = getCategoriesForPhase(selectedPhase);
    categorySelect.innerHTML = '<option value="">All Categories</option>' + cats.map(c => '<option>' + esc(c) + '</option>').join('');
  }
  categorySelect.value = '';
  displayMasterTasks();
}

function onMainPhaseFilterChange() {
  const selectedPhase  = document.getElementById('phaseFilter').value;
  const categorySelect = document.getElementById('categoryFilter');
  if (!selectedPhase) {
    const all = [...new Set(allData.map(i => i.category))].filter(Boolean).sort();
    categorySelect.innerHTML = '<option value="">All Categories</option>' + all.map(c => '<option>' + esc(c) + '</option>').join('');
  } else {
    const cats = getCategoriesForPhase(selectedPhase);
    categorySelect.innerHTML = '<option value="">All Categories</option>' + cats.map(c => '<option>' + esc(c) + '</option>').join('');
  }
  categorySelect.value = '';
  if (isTaskView) renderMasterTasks();
  else displayCards();
}

async function initMasterTasks() {
  try {
    await loadCategoryReference();
    // No separate master filters to populate — shared filter bar is used instead
  } catch (error) {
    if (document.getElementById('masterTasksTableBody')) {
      document.getElementById('masterTasksTableBody').innerHTML =
        '<tr><td colspan="6" style="text-align:center;padding:40px;color:#dc2626;">Init Error: ' + error.message + '</td></tr>';
    }
  }
}

// ============================================
// APP INIT
// ============================================

function initializeApp() {
  // Restore dark mode
  if (localStorage.getItem('darkMode') === 'true') {
    document.body.classList.add('dark-mode');
    const icon = document.getElementById('themeIcon');
    if (icon) icon.textContent = '☀️';
  }

  const themeToggle = document.getElementById('themeToggle');
  if (themeToggle) themeToggle.addEventListener('click', toggleTheme);

  const refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) refreshBtn.addEventListener('click', loadData);

  // Task view toggle
  const taskViewBtn = document.getElementById('taskViewBtn');
  if (taskViewBtn) {
    taskViewBtn.addEventListener('click', () => {
      isTaskView = !isTaskView;
      const masterView   = document.getElementById('masterTaskView');
      const sidebar      = document.getElementById('sidebar');
      const detailPanel  = document.getElementById('detailPanel');
      const projectPanel = document.getElementById('projectDashboard');

      if (isTaskView) {
        if (sidebar)      sidebar.style.display      = 'none';
        if (detailPanel)  detailPanel.style.display  = 'none';
        if (projectPanel) projectPanel.style.display = 'none';
        if (masterView)   masterView.classList.add('active');
        taskViewBtn.style.background = 'var(--accent-primary)';
        taskViewBtn.style.color      = 'white';
        renderMasterTasks();
      } else {
        if (sidebar)     sidebar.style.display     = 'block';
        if (detailPanel) detailPanel.style.display = 'block';
        if (masterView)  masterView.classList.remove('active');
        taskViewBtn.style.background = '';
        taskViewBtn.style.color      = '';
        // Restore right panel only if a project is selected
        if (activeProject && projectPanel) {
          projectPanel.style.display = 'flex';
        }
      }
    });
  }

  // Phase filter cascades category
  const phaseFilterEl = document.getElementById('phaseFilter');
  if (phaseFilterEl) phaseFilterEl.addEventListener('change', onMainPhaseFilterChange);

  ['timeFilter', 'projectSelect', 'categoryFilter', 'statusFilter'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', () => {
      if (isTaskView) renderMasterTasks();
      else displayCards();
    });
  });

  loadData();
}

window.addEventListener('DOMContentLoaded', initializeApp);
  
</script>
